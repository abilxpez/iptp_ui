<main class="main" id="main-content">
  <form action="./search.html" method="get" id="main-search" class="main-search">
    <div class="wrap">
      <label class="sr-only" for="query">Search for Keywords, Topics, Events, Issues and more.</label>
      <input
        role="combobox"
        autocomplete="off"
        aria-owns="res"
        aria-autocomplete="both"
        type="text"
        class="input input--full input-search"
        id="query"
        name="query"
        placeholder="Search for Keywords, Topics, Events, Issues, Names, and more."
      />
      <button type="submit" class="icon" value="Search" aria-label="Search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M15.663 15.663C15.8023 15.5235 15.9677 15.4129 16.1498 15.3374C16.3319 15.2619 16.5271 15.2231 16.7242 15.2231C16.9214 15.2231 17.1165 15.2619 17.2986 15.3374C17.4807 15.4129 17.6462 15.5235 17.7855 15.663L23.5605 21.438C23.8419 21.7193 24.0001 22.1008 24.0003 22.4987C24.0004 22.8966 23.8425 23.2783 23.5612 23.5597C23.28 23.8412 22.8984 23.9994 22.5005 23.9996C22.1026 23.9997 21.7209 23.8418 21.4395 23.5605L15.6645 17.7855C15.525 17.6462 15.4144 17.4808 15.3389 17.2987C15.2634 17.1166 15.2245 16.9214 15.2245 16.7242C15.2245 16.5271 15.2634 16.3319 15.3389 16.1498C15.4144 15.9677 15.525 15.8023 15.6645 15.663H15.663Z" fill="black"/>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M9.75 18C10.8334 18 11.9062 17.7866 12.9071 17.372C13.9081 16.9574 14.8175 16.3497 15.5836 15.5836C16.3497 14.8175 16.9574 13.9081 17.372 12.9071C17.7866 11.9062 18 10.8334 18 9.75C18 8.66659 17.7866 7.5938 17.372 6.59286C16.9574 5.59193 16.3497 4.68245 15.5836 3.91637C14.8175 3.15029 13.9081 2.5426 12.9071 2.12799C11.9062 1.71339 10.8334 1.5 9.75 1.5C7.56196 1.5 5.46354 2.36919 3.91637 3.91637C2.36919 5.46354 1.5 7.56196 1.5 9.75C1.5 11.938 2.36919 14.0365 3.91637 15.5836C5.46354 17.1308 7.56196 18 9.75 18ZM19.5 9.75C19.5 12.3359 18.4728 14.8158 16.6443 16.6443C14.8158 18.4728 12.3359 19.5 9.75 19.5C7.16414 19.5 4.68419 18.4728 2.85571 16.6443C1.02723 14.8158 0 12.3359 0 9.75C0 7.16414 1.02723 4.68419 2.85571 2.85571C4.68419 1.02723 7.16414 0 9.75 0C12.3359 0 14.8158 1.02723 16.6443 2.85571C18.4728 4.68419 19.5 7.16414 19.5 9.75Z" fill="black"/>
          </g>
        </svg>
      </button>
    </div>
  </form>

  <div class="results-panel">
    <div class="wrap">
      <div class="results-toolbar">
        <h2 class="page-title" style="margin: 0 0 1.6rem;">Search Results</h2>
        <div id="search-feedback" class="no-results" hidden></div>
        <div id="search-controls" class="grid-row margin-x--neg1p5 policy-filters" style="display:none;">
          <div class="grid-col--12 filter-container">
            <h2 class="filter-set-heading">Filter by:</h2>
          </div>
          <div class="search-filter-row" style="display: flex; gap: 1rem; width: 100%; justify-content: space-evenly; flex-wrap: wrap; margin-bottom: 1rem;">
            <div style="flex: 1 1 280px;" class="grid-col--12 tablet-s:grid-col--4 tablet-s:padding-x--1p5 margin-bottom--3 tablet-s:margin-bottom--0">
              <button class="filter-button filter-button--litigation" type="button" aria-expanded="false" aria-controls="filters-litigation">
                <span>Actions Subject to Litigation:</span>
                <span class="litigation-off-pill">OFF</span>
              </button>
              <div class="filters-menu filters-menu--wide" id="filters-litigation" hidden>
                <h3 class="filters__heading"><a href="#" onclick="return false;">All</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">On</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Off</a></h3>
              </div>
            </div>
            <div style="flex: 1 1 260px;" class="grid-col--12 tablet-s:grid-col--4 tablet-s:padding-x--1p5 margin-bottom--3 tablet-s:margin-bottom--0">
              <button class="filter-button" type="button" aria-expanded="false" aria-controls="filters-subject-matter">Subject Matter</button>
              <div class="filters-menu filters-menu--wide" id="filters-subject-matter" hidden>
                <h3 class="filters__heading"><a href="#" onclick="return false;">All Subject Matters</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Immigration Courts & EOIR</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Status & Eligibility</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Border & Court Orders</a></h3>
              </div>
            </div>
            <div style="flex: 1 1 220px;" class="grid-col--12 tablet-s:grid-col--4 tablet-s:padding-x--1p5 margin-bottom--3 tablet-s:margin-bottom--0">
              <button class="filter-button" type="button" aria-expanded="false" aria-controls="filters-agencies">Agencies</button>
              <div class="filters-menu filters-menu--wide" id="filters-agencies" hidden>
                <h3 class="filters__heading"><a href="#" onclick="return false;">All Agencies</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">DHS</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">DOJ</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">USCIS</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">CBP</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">ICE</a></h3>
              </div>
            </div>
            <div style="flex: 1 1 280px;" class="grid-col--12 tablet-s:grid-col--4 tablet-s:padding-x--1p5 margin-bottom--3 tablet-s:margin-bottom--0">
              <button class="filter-button" type="button" aria-expanded="false" aria-controls="filters-admin-actions">Administrative Actions</button>
              <div class="filters-menu filters-menu--wide" id="filters-admin-actions" hidden>
                <h3 class="filters__heading"><a href="#" onclick="return false;">All Administrative Actions</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Executive Orders</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Presidential Proclamations</a></h3>
                <h3 class="filters__heading"><a href="#" onclick="return false;">Agency Guidance</a></h3>
              </div>
            </div>
          </div>
          <div class="search-sort-row" style="display: flex; gap: 1rem; width: 100%; flex-wrap: wrap;">
            <div style="flex: 0 1 280px;" class="grid-col--12 tablet-s:grid-col--4 tablet-s:padding-x--1p5 margin-bottom--3 tablet-s:margin-bottom--0">
              <label for="search-sort" class="sr-only">Sort by</label>
              <select id="search-sort" class="filter-button" style="height: 48px;">
                <option value="date">Sort by: Date</option>
                <option value="score">Sort by: Score</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div id="search-results" class="timeline search-results" hidden aria-live="polite"></div>
    </div>
  </div>
</main>
